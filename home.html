<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title>IssuePulse | GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body class="bg-base-200">
    <header>
      <section id="navbar" class="pb-[60px]">
        <div class="navbar bg-base-100 shadow-sm">
          <div class="w-11/12 mx-auto sm:flex">
            <div class="flex-1 flex gap-2 items-center pb-3 sm:pb-0">
              <img class="w-9" src="./assets/github-logo.png" alt="" />
              <h2 class="font-semibold text-2xl text-[#1F2937]">
                GitHub Issues Tracker
              </h2>
            </div>
            <div class="flex gap-2">
              <input
                type="text"
                placeholder="Search"
                class="input input-bordered w-24 md:w-auto"
              />
              <button class="btn btn-primary">
                <i class="fa-solid fa-plus"></i>New Issue
              </button>
            </div>
          </div>
        </div>
      </section>
    </header>

    <main class="sm:w-9/12 mx-auto">
      <section id="tabs" class="bg-base-100 shadow-md p-6 gap-2 rounded-lg">
        <button
          id="All"
          onclick="renderCards('All')"
          class="btn btn-primary py-3 w-[120px] m-1"
        >
          All
        </button>
        <button
          id="Open"
          onclick="renderCards('Open')"
          class="btn py-3 w-[120px] m-1"
        >
          Open
        </button>
        <button
          id="Closed"
          onclick="renderCards('Closed')"
          class="btn py-3 w-[120px] m-1"
        >
          Closed
        </button>
      </section>

      <section id="issues" class="mt-4 mb-1">
        <div
          class="issues-header bg-base-100 shadow-md p-6 rounded-t-lg flex items-center"
        >
          <div class="left flex-1 flex items-center gap-2">
            <img
              class="image p-3 rounded-full bg-[#ECE4FF]"
              src="./assets/Aperture.png"
              alt=""
            />
            <div class="txt">
              <h2 class="font-semibold text-xl text-[#1F2937]">
                <span id="total-issues">50</span> issues
              </h2>
              <p class="text-base text-[#64748B]">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="right flex gap-4">
            <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
            <p><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
          </div>
        </div>
      </section>
      <section class="bg-base-200 shadow-md p-6 rounded-b-lg">
        <div id="cards" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
      </section>

      <section id="spinner" class="flex justify-center items-center py-40">
        <span class="loading loading-spinner loading-xl w-40"></span>
      </section>

      <dialog id="issue_modal" class="modal">
        <div class="modal-box">
          <div id="details-container" class="p-8 space-y-6"></div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <script src="./script/issues.js"></script>
  </body>
</html>
