<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and logo -->
    <title>IssuePulse | GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body class="bg-base-200">
    <section id="sign-in" class="flex justify-center items-center h-lvh">
      <fieldset
        class="fieldset bg-base-100 border-base-300 rounded-box w-xs border p-8 space-y-6 shadow-md rounded-xl w-full md:min-w-[520px]"
      >
        <div id="title" class="text-center">
          <img class="mx-auto pb-6" src="./assets/github-logo.png" alt="" />
          <h2 class="pb-1 font-semibold text-2xl text-[#1F2937]">
            GitHub Issues Tracker
          </h2>
          <p class="text-[#1F2937] text-base">Sign in to manage your issues</p>
        </div>
        <div id="inputs">
          <label class="label font-medium text-[#1F2937] text-base"
            >Username</label
          >
          <br>
          <input id="username-inp" type="text" class="input w-full" placeholder="Enter Username" />
          <p class="text-[#4A00FF] text-sm pb-4 pt-[6px]">Default: admin</p>

          <label class="label font-medium text-[#1F2937] text-base"
            >Password</label
          >
          <br>
          <input id="password-inp" type="password" class="input w-full" placeholder="Enter Password" />
          <p class="text-[#4A00FF] text-sm pt-[6px]">Default: admin123</p>
        </div>
        <button id="sign-in-btn" class="btn btn-primary text-base font-semibold">Sign In</button>

        <div class="flex items-center gap-4 text-[#E4E4E7]">
          <div class="flex-1 border-t"></div>
          <span class="text-[#1F2937]">OR</span>
          <div class="flex-1 border-t"></div>
        </div>

        <div id="demo" class="space-y-8 text-center">
          <h4 class="text-[#64748B] text-sm">Demo Credentials:</h4>
          <p class="text-[#1F2937] text-base"> <span class="font-semibold">Username:</span>
             admin <br />
             <span class="font-semibold">Password:</span>
             admin123
          </p>
        </div>
      </fieldset>
    </section>
    <script src="./script/auth.js"></script>
  </body>
</html>
